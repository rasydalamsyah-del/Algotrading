<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    body{margin:0;background:#0b0e11;-webkit-font-smoothing:antialiased}
    a{color:#f0983f}
    a:hover{color:#f5b46b}
  </style>
</helmet>
<div style="min-height:100vh;background:#0b0e11;color:#e6eaf2;font-family:'Inter',system-ui,sans-serif;font-size:13px;line-height:1.5;overflow-x:hidden">
  <div style="position:fixed;bottom:16px;right:16px;z-index:300;display:flex;flex-direction:column;gap:7px;max-width:calc(100vw - 32px)">
    <sc-for list="{{ toasts }}" as="t" hint-placeholder-count="0">
      <div style="background:#161e2e;border:1px solid #1e2d45;border-left:3px solid {{ t.accent }};border-radius:6px;padding:10px 14px;display:flex;align-items:flex-start;gap:9px;box-shadow:0 4px 24px rgba(0,0,0,0.5);min-width:260px">
        <span style="font-size:15px;flex-shrink:0">{{ t.icon }}</span>
        <div style="flex:1"><div style="font-size:11.5px;font-weight:700">{{ t.title }}</div><div style="font-size:10px;color:#4a5878;margin-top:1px">{{ t.msg }}</div></div>
        <span onclick="{{ t.onClose }}" style="cursor:pointer;color:#4a5878;font-size:13px;flex-shrink:0">✕</span>
      </div>
    </sc-for>
  </div>
  <nav style="position:sticky;top:0;z-index:80;height:56px;background:rgba(11,14,17,0.95);backdrop-filter:blur(20px);border-bottom:1px solid #1e2d45;display:flex;align-items:center;padding:0 20px;gap:14px">
    <a href="Futures Dashboard.dc.html" style="display:flex;align-items:center;gap:9px;font-weight:700;font-size:14px;text-decoration:none;color:#e6eaf2">
      <div style="width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#f0983f,#f0455a);display:flex;align-items:center;justify-content:center;font-size:15px">⚡</div>
      AlgoTrader <span style="color:#f0983f;margin-left:2px">Futures</span>
    </a>
  </nav>
  <main style="max-width:1000px;margin:0 auto;padding:20px">
    <div style="margin-bottom:16px">
      <div style="font-size:17px;font-weight:700">Settings — Futures</div>
      <div style="font-size:11px;color:#4a5878;margin-top:2px">Bot futures configuration · port terpisah dari spot</div>
    </div>
    <div style="margin-bottom:22px">
      <div style="font-size:12px;font-weight:700;margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid #1e2d45">🌐 API Configuration</div>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px">
        <div>
          <label style="font-size:10px;color:#4a5878;font-weight:600;margin-bottom:4px;display:block;text-transform:uppercase">API Base URL (Futures)</label>
          <input value="{{ apiBaseInput }}" oninput="{{ onApiBaseInput }}" onblur="{{ onApiBaseBlur }}" style="width:100%;background:#0f1420;border:1px solid #1e2d45;border-radius:6px;color:#e6eaf2;padding:7px 10px;font-size:11.5px;font-family:'JetBrains Mono',monospace;outline:none;box-sizing:border-box" />
          <div style="font-size:9.5px;color:#4a5878;margin-top:3px">Default :8001 (spot :8000) — proses OS terpisah.</div>
        </div>
        <div>
          <label style="font-size:10px;color:#4a5878;font-weight:600;margin-bottom:4px;display:block;text-transform:uppercase">API Status</label>
          <input readonly value="{{ apiStatusLabel }}" style="width:100%;background:#0f1420;border:1px solid #1e2d45;border-radius:6px;color:{{ apiStatusColor }};padding:7px 10px;font-size:11.5px;font-family:'JetBrains Mono',monospace;outline:none;box-sizing:border-box" />
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button onclick="{{ testConnection }}" style="background:#f0983f;border:none;border-radius:6px;padding:7px 16px;font-size:11px;color:#fff;font-weight:700;cursor:pointer;font-family:inherit">🔌 Test Connection</button>
      </div>
    </div>
    <div style="margin-bottom:22px">
      <div style="font-size:12px;font-weight:700;margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid #1e2d45">📊 Bot Status</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
        <sc-for list="{{ statusFields }}" as="f" hint-placeholder-count="6">
          <div>
            <label style="font-size:10px;color:#4a5878;font-weight:600;margin-bottom:4px;display:block;text-transform:uppercase">{{ f.label }}</label>
            <input readonly value="{{ f.value }}" style="width:100%;background:#0f1420;border:1px solid #1e2d45;border-radius:6px;color:#8a9bba;padding:7px 10px;font-size:11.5px;font-family:'JetBrains Mono',monospace;outline:none;box-sizing:border-box" />
          </div>
        </sc-for>
      </div>
    </div>
    <div>
      <div style="font-size:12px;font-weight:700;margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid #1e2d45">⚙️ Risk &amp; Leverage Config</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
        <sc-for list="{{ riskFields }}" as="rf" hint-placeholder-count="6">
          <div>
            <label style="font-size:10px;color:#4a5878;font-weight:600;margin-bottom:4px;display:block;text-transform:uppercase">{{ rf.label }}</label>
            <input value="{{ rf.value }}" oninput="{{ rf.onInput }}" type="number" step="0.1" style="width:100%;background:#0f1420;border:1px solid #1e2d45;border-radius:6px;color:#e6eaf2;padding:7px 10px;font-size:11.5px;font-family:'JetBrains Mono',monospace;outline:none;box-sizing:border-box" />
          </div>
        </sc-for>
      </div>
      <div style="margin-top:12px">
        <button onclick="{{ saveRiskConfig }}" style="background:#f0983f;border:none;border-radius:6px;padding:7px 18px;font-size:11px;color:#fff;font-weight:700;cursor:pointer;font-family:inherit">💾 Simpan</button>
      </div>
    </div>
  </main>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>

function demoStatus() { return { exchange: 'BINANCE', strategy: 'FuturesEngine', testnet: true, margin_mode: 'isolated', default_leverage: 10, uptime_display: '1j 20m' }; }
function demoRisk() { return { max_drawdown_pct: 15, max_position_size_pct: 10, daily_loss_limit_pct: 10, default_leverage: 10, max_leverage: 20, risk_per_trade_pct: 1 }; }
let toastSeq = 0;
class Component extends DCLogic {
  state = {
    apiBase: 'http://localhost:8001/api', apiKey: '', apiBaseInput: 'http://localhost:8001/api',
    apiStatus: 'unknown', status: null, risk: {}, riskInputs: {}, toasts: [],
  };
  toast(type, title, msg) {
    const id = ++toastSeq;
    const meta = { success: { icon: '✅', accent: '#00d68f' }, error: { icon: '❌', accent: '#f0455a' }, warn: { icon: '⚠️', accent: '#f0b429' } }[type] || {};
    this.setState(s => ({ toasts: [...s.toasts, { id, title, msg, icon: meta.icon, accent: meta.accent }] }));
    setTimeout(() => this.setState(s => ({ toasts: s.toasts.filter(t => t.id !== id) })), 5000);
  }
  closeToast(id) { this.setState(s => ({ toasts: s.toasts.filter(t => t.id !== id) })); }
  componentDidMount() {
    try {
      const b = localStorage.getItem('gsf_api_base'); if (b) this.state.apiBase = this.state.apiBaseInput = b;
      const k = localStorage.getItem('gs_api_key'); if (k) this.state.apiKey = k;
    } catch (e) {}
    this.fetchData();
  }
  onApiBaseInput = (e) => this.setState({ apiBaseInput: e.target.value });
  onApiBaseBlur = () => {
    const base = this.state.apiBaseInput.trim().replace(/\/$/, '');
    try { localStorage.setItem('gsf_api_base', base); } catch (e) {}
    this.setState({ apiBase: base, apiBaseInput: base });
  };
  async fetchData() {
    try {
      const hdrs = {}; if (this.state.apiKey) hdrs['X-API-Key'] = this.state.apiKey;
      const s = await fetch(this.state.apiBase + '/status', { headers: hdrs }).then(r => r.ok ? r.json() : null);
      const c = await fetch(this.state.apiBase + '/config/current', { headers: hdrs }).then(r => r.ok ? r.json() : null);
      if (s) { const risk = (c && c.config) || demoRisk(); this.setState({ status: s, risk, riskInputs: { ...risk }, apiStatus: 'ok' }); }
      else this.setState({ status: demoStatus(), risk: demoRisk(), riskInputs: { ...demoRisk() }, apiStatus: 'fail' });
    } catch (e) { this.setState({ status: demoStatus(), risk: demoRisk(), riskInputs: { ...demoRisk() }, apiStatus: 'fail' }); }
  }
  testConnection = async () => {
    try {
      const hdrs = {}; if (this.state.apiKey) hdrs['X-API-Key'] = this.state.apiKey;
      const r = await fetch(this.state.apiBase + '/status', { headers: hdrs });
      this.setState({ apiStatus: r.ok ? 'ok' : 'fail' });
      if (r.ok) this.toast('success', '✅ Terhubung', 'Berhasil terhubung ke bot futures.'); else this.toast('error', '❌ Gagal', 'Cek URL & API key.');
    } catch (e) { this.setState({ apiStatus: 'fail' }); this.toast('error', '❌ Gagal', e.message || String(e)); }
  };
  onRiskInput(key, e) { this.setState(s => ({ riskInputs: { ...s.riskInputs, [key]: e.target.value } })); }
  saveRiskConfig = async () => {
    try {
      const r = await fetch(this.state.apiBase + '/config/update', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-API-Key': this.state.apiKey }, body: JSON.stringify(this.state.riskInputs) });
      const data = await r.json();
      if (r.ok && data.success) this.toast('success', '💾 Tersimpan', 'Config futures disimpan.'); else this.toast('error', '❌ Gagal', (data && (data.message || data.error)) || ('HTTP ' + r.status));
    } catch (e) { this.toast('error', 'Gagal menghubungi bot', e.message || String(e)); }
  };
  renderVals() {
    const s = this.state.status || {};
    const statusFields = [
      { label: 'Exchange', value: (s.exchange || '—').toUpperCase() },
      { label: 'Strategy', value: s.strategy || '—' },
      { label: 'Mode', value: s.testnet ? 'TESTNET' : 'LIVE' },
      { label: 'Margin Mode', value: (s.margin_mode || '—') },
      { label: 'Default Leverage', value: (s.default_leverage || '—') + '×' },
      { label: 'Uptime', value: s.uptime_display || '—' },
    ];
    const ri = this.state.riskInputs || {};
    const riskFieldDefs = [
      ['max_drawdown_pct', 'Max Drawdown %'], ['max_position_size_pct', 'Max Position %'],
      ['daily_loss_limit_pct', 'Daily Loss Limit %'], ['default_leverage', 'Default Leverage'],
      ['max_leverage', 'Max Leverage'], ['risk_per_trade_pct', 'Risk Per Trade %'],
    ];
    const riskFields = riskFieldDefs.map(([key, label]) => ({ label, value: ri[key] ?? '', onInput: (e) => this.onRiskInput(key, e) }));
    const toasts = this.state.toasts.map(t => ({ ...t, onClose: () => this.closeToast(t.id) }));
    return {
      toasts, apiBaseInput: this.state.apiBaseInput, onApiBaseInput: this.onApiBaseInput, onApiBaseBlur: this.onApiBaseBlur,
      apiStatusLabel: this.state.apiStatus === 'ok' ? '✅ Connected' : this.state.apiStatus === 'fail' ? '❌ Disconnected (data contoh)' : '— Belum dites',
      apiStatusColor: this.state.apiStatus === 'ok' ? '#00d68f' : '#f0455a', testConnection: this.testConnection,
      statusFields, riskFields, saveRiskConfig: this.saveRiskConfig,
    };
  }
}

</script>
</body>
</html>
